schemaVersion: "1"
kind: mixin
name: planning-with-files
displayName: Planning with Files skill
description: >
  Ships the Manus-style persistent markdown planning skill
  (github.com/OthmanAdi/planning-with-files, v3.1.3, MIT) into the sandbox
  workspace so the agent plans in task_plan.md / findings.md / progress.md
  instead of volatile context.

commands:
  startup:
    - command:
        - sh
        - -c
        - "chmod +x .claude/skills/planning-with-files/scripts/*.sh 2>/dev/null || true"
      user: "1000"
      description: Ensure planning-with-files helper scripts are executable
